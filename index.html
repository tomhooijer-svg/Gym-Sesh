<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymSesh">
<title>GymSesh</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1e1e21;
  --surface3: #28282c;
  --accent: #d4f53c;
  --accent-dim: rgba(212,245,60,0.12);
  --green: #3cffa0;
  --red: #ff5c5c;
  --text: #efefed;
  --muted: #555;
  --muted2: #888;
  --border: #252528;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overscroll-behavior: none;
  padding-bottom: 100px;
}

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 200;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
}
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 3px;
  line-height: 1;
}
.logo span { color: var(--accent); }

/* Timer */
.timer-block { display: flex; align-items: center; gap: 8px; }
.timer-display {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 2px;
  color: var(--muted2);
  transition: color .3s;
  min-width: 68px;
  text-align: right;
}
.timer-display.running { color: var(--accent); }
.timer-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.timer-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0b; }

/* Week + Day tabs */
.week-row { display: flex; gap: 6px; margin-bottom: 10px; }
.week-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .9rem; letter-spacing: 1px;
  padding: 5px 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.week-btn.active { background: var(--accent); color: #0a0a0b; border-color: var(--accent); font-weight: 700; }
.edit-btn-small {
  margin-left: auto;
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted2);
  cursor: pointer;
}
.day-tabs { display: flex; overflow-x: auto; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .85rem; letter-spacing: 1px;
  padding: 10px 16px;
  border: none; background: none;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
}
.day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.prog-bar-wrap { height: 2px; background: var(--border); }
.prog-bar { height: 100%; background: var(--accent); transition: width .4s ease; width: 0; }
.prog-lbl { font-size: .65rem; color: var(--muted); text-align: right; padding: 3px 0 5px; min-height: 17px; }

/* ─── MAIN ─── */
main { padding: 16px 14px 0; }
.day-view { display: none; }
.day-view.active { display: block; }
.day-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7rem; letter-spacing: 2px; line-height: 1;
}
.day-sub { color: var(--green); font-size: .68rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; margin-bottom: 16px; }

.muscle-lbl {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .75rem; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  margin: 18px 0 8px 2px;
}

/* ─── EXERCISE CARD ─── */
.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 7px;
  overflow: hidden;
  transition: border-color .2s;
}
.ex-card.done { border-color: var(--accent); opacity: .55; }
.ex-top {
  display: flex; align-items: center;
  padding: 11px 12px; gap: 10px;
  cursor: pointer; user-select: none;
}
.check-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: none;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
  transition: all .15s;
}
.ex-card.done .check-btn { background: var(--accent); border-color: var(--accent); }
.check-icon { display: none; }
.ex-card.done .check-icon { display: block; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-weight: 600; font-size: .88rem; line-height: 1.2; }
.ex-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.ex-sets-lbl { font-size: .7rem; color: var(--muted2); }
.prog-badge {
  font-size: .65rem; font-weight: 600;
  padding: 1px 6px; border-radius: 20px;
  letter-spacing: .5px;
}
.prog-badge.up { background: rgba(60,255,160,.15); color: var(--green); }
.prog-badge.down { background: rgba(255,92,92,.15); color: var(--red); }
.prog-badge.same { background: var(--surface2); color: var(--muted2); }
.expand-ic { color: var(--muted); font-size: .9rem; transition: transform .2s; flex-shrink: 0; }
.ex-card.open .expand-ic { transform: rotate(180deg); }

.ex-detail { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
.ex-card.open .ex-detail { display: block; }

/* Previous weight */
.prev-row { margin-top: 10px; font-size: .72rem; color: var(--muted2); display: flex; align-items: center; gap: 5px; }
.prev-val { color: var(--muted2); font-weight: 600; }

/* Sets */
.sets-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.set-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 8px 10px;
}
.set-num { font-size: .7rem; color: var(--muted); min-width: 36px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }
.set-reps { font-size: .78rem; color: var(--muted2); min-width: 48px; }
.set-weight-wrap { flex: 1; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.set-weight-inp {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem; font-weight: 600;
  padding: 6px 8px;
  width: 68px;
  outline: none; text-align: center;
  transition: border-color .15s;
}
.set-weight-inp:focus { border-color: var(--accent); }
.set-weight-inp::placeholder { color: var(--border); }
.kg-lbl { font-size: .72rem; color: var(--muted); min-width: 16px; }

/* ─── RESET BTN ─── */
.reset-btn {
  width: 100%; margin-top: 22px; padding: 12px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: .8rem;
  cursor: pointer;
}

/* ─── EDIT MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(4px);
  overflow-y: auto;
  padding: 20px 14px 60px;
}
.modal-overlay.open { display: block; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px;
  max-width: 480px;
  margin: 0 auto;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 2px;
  margin-bottom: 16px;
}
.modal-section { margin-bottom: 20px; }
.modal-section-lbl {
  font-size: .68rem; color: var(--muted2);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px;
}
.edit-ex-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.edit-ex-inp {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  padding: 8px 10px;
  outline: none;
}
.edit-ex-inp:focus { border-color: var(--accent); }
.edit-sets-inp {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  padding: 8px 8px;
  outline: none;
  width: 90px; text-align: center;
}
.edit-sets-inp:focus { border-color: var(--accent); }
.del-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface3);
  color: var(--muted2);
  cursor: pointer;
  font-size: .85rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.add-ex-btn {
  width: 100%; padding: 9px;
  border-radius: 8px;
  border: 1px dashed var(--border);
  background: none; color: var(--muted2);
  font-family: 'DM Sans', sans-serif; font-size: .8rem;
  cursor: pointer; margin-top: 4px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 6px; }
.btn-save {
  flex: 1; padding: 12px;
  border-radius: 8px; border: none;
  background: var(--accent); color: #0a0a0b;
  font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600;
  cursor: pointer;
}
.btn-cancel {
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted2);
  font-family: 'DM Sans', sans-serif; font-size: .9rem;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">GYM<span>SESH</span></div>
    <div class="timer-block">
      <div class="timer-display" id="timerDisplay">00:00</div>
      <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">▶</button>
    </div>
  </div>
  <div class="week-row">
    <button class="week-btn active" onclick="setWeek('A')">WEEK A</button>
    <button class="week-btn" onclick="setWeek('B')">WEEK B</button>
    <button class="edit-btn-small" onclick="openEdit()">✏️ Schema aanpassen</button>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="setDay(0)">RUG & BI</button>
    <button class="day-tab" onclick="setDay(1)">BORST & TRI</button>
    <button class="day-tab" id="tab2" onclick="setDay(2)">SCHOUDERS</button>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="prog-lbl" id="progLbl"></div>
</header>

<main>
  <div class="day-view active" id="day0">
    <div class="day-title">RUG & BICEPS</div>
    <div class="day-sub">Dag 1 — alle weken</div>
    <div class="muscle-lbl">— Rug</div><div id="ex-rug"></div>
    <div class="muscle-lbl">— Biceps</div><div id="ex-bi"></div>
    <button class="reset-btn" onclick="resetDay(0)">↺ Reset dag</button>
  </div>
  <div class="day-view" id="day1">
    <div class="day-title">BORST & TRICEPS</div>
    <div class="day-sub">Dag 2 — alle weken</div>
    <div class="muscle-lbl">— Borst</div><div id="ex-borst"></div>
    <div class="muscle-lbl">— Triceps</div><div id="ex-tri"></div>
    <button class="reset-btn" onclick="resetDay(1)">↺ Reset dag</button>
  </div>
  <div class="day-view" id="day2">
    <div class="day-title" id="d3title">SCHOUDERS & TRICEPS</div>
    <div class="day-sub" id="d3sub">Dag 3 — Week A</div>
    <div class="muscle-lbl">— Schouders</div><div id="ex-scho"></div>
    <div class="muscle-lbl" id="armlbl">— Triceps</div><div id="ex-arm"></div>
    <button class="reset-btn" onclick="resetDay(2)">↺ Reset dag</button>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">SCHEMA AANPASSEN</div>
    <div id="editSections"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Annuleren</button>
      <button class="btn-save" onclick="saveEdit()">Opslaan</button>
    </div>
  </div>
</div>

<script>
// ─── DEFAULT SCHEMA ───
const DEFAULT_SCHEMA = {
  rug: {
    label: "Rug",
    exercises: [
      {n:"Lat Pulldown", s:"4×6–10"},
      {n:"Seated Row Machine", s:"3×8–12"},
      {n:"Chest Supported Dumbbell Row", s:"3×10–12"},
      {n:"Reverse Pec Deck", s:"3×12–15"}
    ]
  },
  bi: {
    label: "Biceps",
    exercises: [
      {n:"Incline Dumbbell Curl", s:"3×8–12"},
      {n:"Hammer Curl", s:"3×10–12"},
      {n:"Seated Alternating Dumbbell Curl", s:"2×12–15"}
    ]
  },
  borst: {
    label: "Borst",
    exercises: [
      {n:"Chest Press Machine (Flat)", s:"4×6–10"},
      {n:"Incline Dumbbell Press", s:"3×8–12"},
      {n:"Decline Chest Press Machine", s:"2×8–12"},
      {n:"Pec Deck / Chest Fly Machine", s:"3×12–15"}
    ]
  },
  tri: {
    label: "Triceps",
    exercises: [
      {n:"Cable Triceps Pushdown (Rope)", s:"3×8–12"},
      {n:"Overhead Cable Triceps Extension (Rope)", s:"3×10–15"},
      {n:"Cable Triceps Pushdown (V-bar)", s:"2×12–15"}
    ]
  },
  schoA: {
    label: "Schouders (Week A)",
    exercises: [
      {n:"Shoulder Press Machine", s:"4×6–10"},
      {n:"Dumbbell Lateral Raise", s:"4×12–15"},
      {n:"Reverse Pec Deck", s:"3×12–15"},
      {n:"Rear Delt Dumbbell Raise", s:"3×12–15"}
    ]
  },
  triA: {
    label: "Triceps (Week A dag 3)",
    exercises: [
      {n:"Cable Triceps Pushdown (Rope)", s:"3×10–12"},
      {n:"Single Arm Overhead Cable Extension", s:"2×12–15"}
    ]
  },
  schoB: {
    label: "Schouders (Week B)",
    exercises: [
      {n:"Seated Dumbbell Shoulder Press", s:"4×6–10"},
      {n:"Arnold Press", s:"3×8–12"},
      {n:"Dumbbell Lateral Raise", s:"4×12–15"},
      {n:"Rear Delt Dumbbell Raise", s:"3×12–15"}
    ]
  },
  biB: {
    label: "Biceps (Week B dag 3)",
    exercises: [
      {n:"Spider Curl (Dumbbells)", s:"3×8–12"},
      {n:"Cross Body Hammer Curl", s:"3×10–12"},
      {n:"Concentration Curl", s:"2×12–15"}
    ]
  }
};

// ─── STATE ───
function loadSchema() {
  try { const s = localStorage.getItem('gymsesh_schema'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_SCHEMA)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULT_SCHEMA)); }
}
function saveSchema(s) { localStorage.setItem('gymsesh_schema', JSON.stringify(s)); }

function getWorkoutKey(week, pfx) { return `gymsesh_w${week}_${pfx}`; }
function loadWorkout(week, pfx) {
  try { const s = localStorage.getItem(getWorkoutKey(week,pfx)); return s ? JSON.parse(s) : {}; }
  catch(e) { return {}; }
}
function saveWorkout(week, pfx, data) { localStorage.setItem(getWorkoutKey(week,pfx), JSON.stringify(data)); }

// Load previous week's weights for comparison
function getPrevWeekWeight(pfx, exIdx) {
  const prevWeek = currentWeek === 'A' ? 'B' : 'A';
  const prev = loadWorkout(prevWeek, pfx);
  const key = `ex${exIdx}`;
  if (!prev[key]) return null;
  // Return max weight used
  const weights = Object.values(prev[key].weights || {}).map(Number).filter(v => v > 0);
  return weights.length ? Math.max(...weights) : null;
}

let schema = loadSchema();
let currentWeek = 'A';
let currentDay = 0;

// ─── TIMER ───
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerBtn').textContent = '▶';
    document.getElementById('timerBtn').classList.remove('active');
    document.getElementById('timerDisplay').classList.remove('running');
  } else {
    timerRunning = true;
    document.getElementById('timerBtn').textContent = '■';
    document.getElementById('timerBtn').classList.add('active');
    document.getElementById('timerDisplay').classList.add('running');
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
      const s = String(timerSeconds%60).padStart(2,'0');
      document.getElementById('timerDisplay').textContent = m+':'+s;
    }, 1000);
  }
}

// ─── SETS PARSING ───
function getNumSets(s) { return parseInt(s.match(/^(\d+)/)?.[1] || 3); }
function getRepsLabel(s) {
  const m = s.match(/×(.+)$/);
  return m ? m[1] + ' reps' : '';
}

// ─── RENDER ───
function render(containerId, groupKey) {
  const grp = schema[groupKey];
  const container = document.getElementById(containerId);
  if (!container || !grp) return;
  container.innerHTML = '';

  const workout = loadWorkout(currentWeek, groupKey);

  grp.exercises.forEach((ex, i) => {
    const key = `ex${i}`;
    const exData = workout[key] || { done: false, weights: {} };
    const done = !!exData.done;
    const numSets = getNumSets(ex.s);
    const repsLbl = getRepsLabel(ex.s);
    const prevWeight = getPrevWeekWeight(groupKey, i);
    const curWeights = Object.values(exData.weights || {}).map(Number).filter(v=>v>0);
    const curMax = curWeights.length ? Math.max(...curWeights) : null;

    // Progress badge
    let badge = '';
    if (prevWeight !== null && curMax !== null) {
      if (curMax > prevWeight) badge = `<span class="prog-badge up">↑ ${curMax-prevWeight}kg</span>`;
      else if (curMax < prevWeight) badge = `<span class="prog-badge down">↓ ${prevWeight-curMax}kg</span>`;
      else badge = `<span class="prog-badge same">= gelijk</span>`;
    }

    // Sets rows
    let setsHtml = '';
    for (let s = 0; s < numSets; s++) {
      const w = exData.weights?.[s] || '';
      setsHtml += `
        <div class="set-row">
          <span class="set-num">Set ${s+1}</span>
          <span class="set-reps">${repsLbl}</span>
          <div class="set-weight-wrap">
            <input class="set-weight-inp" type="number" inputmode="decimal"
              placeholder="kg" value="${w}"
              data-group="${groupKey}" data-ex="${i}" data-set="${s}"
              onchange="onWeightChange(this)"
              oninput="onWeightInput(this)">
            <span class="kg-lbl">kg</span>
          </div>
        </div>`;
    }

    const prevHtml = prevWeight !== null
      ? `<div class="prev-row">Vorige week: <span class="prev-val">${prevWeight} kg</span></div>`
      : `<div class="prev-row" style="color:var(--muted)">Nog geen data van vorige week</div>`;

    const card = document.createElement('div');
    card.className = 'ex-card' + (done ? ' done' : '');
    card.id = `card-${groupKey}-${i}`;
    card.innerHTML = `
      <div class="ex-top" onclick="toggleCard('${groupKey}',${i})">
        <button class="check-btn" onclick="toggleDone(event,'${groupKey}',${i})">
          <svg class="check-icon" width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1.5 5.5l3 3 5-5" stroke="#0a0a0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="ex-info">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-meta">
            <span class="ex-sets-lbl">${ex.s}</span>
            ${badge}
          </div>
        </div>
        <div class="expand-ic">⌄</div>
      </div>
      <div class="ex-detail">
        ${prevHtml}
        <div class="sets-list">${setsHtml}</div>
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}

function toggleCard(grp, i) {
  const card = document.getElementById(`card-${grp}-${i}`);
  card.classList.toggle('open');
}

function toggleDone(e, grp, i) {
  e.stopPropagation();
  const workout = loadWorkout(currentWeek, grp);
  const key = `ex${i}`;
  if (!workout[key]) workout[key] = { done: false, weights: {} };
  workout[key].done = !workout[key].done;
  saveWorkout(currentWeek, grp, workout);
  renderAll();
}

function onWeightInput(inp) {
  const grp = inp.dataset.group;
  const exIdx = parseInt(inp.dataset.ex);
  const setIdx = parseInt(inp.dataset.set);
  const val = inp.value;
  const numSets = getNumSets(schema[grp].exercises[exIdx].s);

  // Auto-fill subsequent sets that are empty
  const detail = inp.closest('.ex-detail');
  const allInps = detail.querySelectorAll('.set-weight-inp');
  for (let s = setIdx + 1; s < numSets; s++) {
    const nextInp = allInps[s];
    if (nextInp && (nextInp.value === '' || nextInp.dataset.autofilled === 'true')) {
      nextInp.value = val;
      nextInp.dataset.autofilled = 'true';
    }
  }
}

function onWeightChange(inp) {
  const grp = inp.dataset.group;
  const exIdx = parseInt(inp.dataset.ex);
  const setIdx = parseInt(inp.dataset.set);
  const val = inp.value;

  const workout = loadWorkout(currentWeek, grp);
  const key = `ex${exIdx}`;
  if (!workout[key]) workout[key] = { done: false, weights: {} };
  workout[key].weights[setIdx] = val;
  saveWorkout(currentWeek, grp, workout);

  // Update progress badge without full re-render
  updateProgress();
}

function renderAll() {
  render('ex-rug', 'rug');
  render('ex-bi', 'bi');
  render('ex-borst', 'borst');
  render('ex-tri', 'tri');
  if (currentWeek === 'A') {
    render('ex-scho', 'schoA');
    render('ex-arm', 'triA');
    document.getElementById('d3title').textContent = 'SCHOUDERS & TRICEPS';
    document.getElementById('d3sub').textContent = 'Dag 3 — Week A';
    document.getElementById('armlbl').textContent = '— Triceps';
  } else {
    render('ex-scho', 'schoB');
    render('ex-arm', 'biB');
    document.getElementById('d3title').textContent = 'SCHOUDERS & BICEPS';
    document.getElementById('d3sub').textContent = 'Dag 3 — Week B';
    document.getElementById('armlbl').textContent = '— Biceps';
  }
  updateProgress();
}

function getDayGroups() {
  return [
    ['rug','bi'],
    ['borst','tri'],
    currentWeek === 'A' ? ['schoA','triA'] : ['schoB','biB']
  ];
}

function updateProgress() {
  const groups = getDayGroups()[currentDay];
  let tot = 0, done = 0;
  groups.forEach(grp => {
    const grpData = schema[grp];
    if (!grpData) return;
    const workout = loadWorkout(currentWeek, grp);
    grpData.exercises.forEach((_, i) => {
      tot++;
      if (workout[`ex${i}`]?.done) done++;
    });
  });
  const pct = tot ? Math.round(done/tot*100) : 0;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLbl').textContent = done > 0 ? `${done}/${tot} oefeningen klaar` : '';
}

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-btn').forEach((b,i) => b.classList.toggle('active', i===(w==='A'?0:1)));
  renderAll();
}

function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-view').forEach((v,i) => v.classList.toggle('active', i===d));
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===d));
  updateProgress();
}

function resetDay(d) {
  const groups = getDayGroups()[d];
  if (!confirm('Reset alle data voor deze dag?')) return;
  groups.forEach(grp => localStorage.removeItem(getWorkoutKey(currentWeek, grp)));
  renderAll();
}

// ─── EDIT MODAL ───
function openEdit() {
  const sections = document.getElementById('editSections');
  sections.innerHTML = '';
  const keys = ['rug','bi','borst','tri','schoA','triA','schoB','biB'];
  keys.forEach(grp => {
    const g = schema[grp];
    const sec = document.createElement('div');
    sec.className = 'modal-section';
    sec.innerHTML = `<div class="modal-section-lbl">${g.label}</div>`;
    g.exercises.forEach((ex, i) => {
      const row = document.createElement('div');
      row.className = 'edit-ex-row';
      row.innerHTML = `
        <input class="edit-ex-inp" placeholder="Oefening naam" value="${ex.n}" data-grp="${grp}" data-idx="${i}" data-field="n">
        <input class="edit-sets-inp" placeholder="bijv. 3×10" value="${ex.s}" data-grp="${grp}" data-idx="${i}" data-field="s">
        <button class="del-btn" onclick="deleteEx('${grp}',${i})">✕</button>`;
      sec.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-ex-btn';
    addBtn.textContent = '+ Oefening toevoegen';
    addBtn.onclick = () => addEx(grp);
    sec.appendChild(addBtn);
    sections.appendChild(sec);
  });
  document.getElementById('editModal').classList.add('open');
}

function deleteEx(grp, idx) {
  schema[grp].exercises.splice(idx, 1);
  openEdit();
}

function addEx(grp) {
  schema[grp].exercises.push({n: 'Nieuwe oefening', s: '3×10–12'});
  openEdit();
}

function saveEdit() {
  document.querySelectorAll('.edit-ex-inp, .edit-sets-inp').forEach(inp => {
    const grp = inp.dataset.grp;
    const idx = parseInt(inp.dataset.idx);
    const field = inp.dataset.field;
    if (schema[grp] && schema[grp].exercises[idx]) {
      schema[grp].exercises[idx][field] = inp.value;
    }
  });
  saveSchema(schema);
  closeEdit();
  renderAll();
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
}

// ─── INIT ───
renderAll();
</script>
</body>
</html>
